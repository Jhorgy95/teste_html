<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .form-container {
            background: #fff;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .btn-img {
            margin-top: 15px;
            cursor: pointer;
            width: 150px;
        }
        #resultado {
            margin-top: 20px;
        }
        #resultado img {
            width: 120px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Cadastro</h2>
    <form id="formulario">
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="sobrenome" placeholder="Sobrenome">
        <input type="number" id="idade" placeholder="Idade">

        <!-- Botão baseado em imagem -->
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828640.png"
             alt="Enviar"
             class="btn-img"
             onclick="enviarFormulario()">
    </form>

    <div id="resultado"></div>
</div>

<script>
function enviarFormulario() {
    let nome = document.getElementById("nome").value;
    let sobrenome = document.getElementById("sobrenome").value;
    let idade = document.getElementById("idade").value;

    let resultado = document.getElementById("resultado");

    if (nome && sobrenome && idade) {
        resultado.innerHTML = `
            <p>Cadastro realizado com sucesso!</p>
            <img src="https://cdn-icons-png.flaticon.com/512/845/845646.png" alt="Sucesso">
        `;
    } else {
        resultado.innerHTML = `
            <p>Preencha todos os dados!</p>
            <img src="https://cdn-icons-png.flaticon.com/512/463/463612.png" alt="Erro">
        `;
    }
}
</script>

</body>
</html>
